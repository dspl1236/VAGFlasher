name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "ruff==0.15.10"
      - run: ruff check vagflasher/ tests/

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest -v --tb=short

  build:
    needs: test
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          pip install -e ".[dev]"
          pip install pyinstaller build
      - run: python -m build
      - name: Build Windows exe
        run: pyinstaller --onefile --name VAGFlasher vagflasher/cli.py
      - name: Verify exe
        run: |
          if (Test-Path "dist/VAGFlasher.exe") {
            Get-Item "dist/VAGFlasher.exe" | Select-Object Name, Length
          } else {
            Write-Error "VAGFlasher.exe not found"
            exit 1
          }
      - uses: actions/upload-artifact@v4
        with:
          name: VAGFlasher-Windows
          path: dist/VAGFlasher.exe
          retention-days: 30
      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/VAGFlasher.exe
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true
